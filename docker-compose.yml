services:
  db:
    image: postgres:15
    container_name: planner_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 31220566
      POSTGRES_DB: planner
    ports:
      - "5432:5432"
    volumes:
      - planner_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: planner_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planner_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:31220566@db:5432/planner
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OAUTHLIB_INSECURE_TRANSPORT: "1"
      FLASK_ENV: development
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_SCHEDULE_MODEL: ${OPENAI_SCHEDULE_MODEL}

    volumes:
      - ./backend/infrastructure/credentials.json:/app/backend/infrastructure/credentials.json:ro

volumes:
  planner_postgres_data: